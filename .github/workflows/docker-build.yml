name: Docker Build and Push

on:
  push:
    branches:
      - master
      - main
      - test
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - master
      - main
      - test

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 站点域名在 web 镜像里是构建期烤死的（见 clients/web/Dockerfile 的 ARG 注释），
      # 所以按分支取值：test 分支出测试域名的镜像，其余出生产域名的镜像。
      # 这两个值建在 Secrets 而非 Variables 里，因此走 secrets 上下文。
      # 代价是日志里会被打码成 ***，排查时看不到实际域名。
      SITE_URL: ${{ github.ref == 'refs/heads/test' && secrets.SITE_URL_TEST || secrets.SITE_URL_PROD }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: services/api/Dockerfile
            image: autix-api
          - service: web
            dockerfile: clients/web/Dockerfile
            image: autix-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          # api 的 Dockerfile 没声明这个 ARG，Docker 只会 warn，不影响构建
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ env.SITE_URL }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Set GHCR package to public
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/users/${OWNER}/packages/container/${{ matrix.image }}/visibility" \
            -d '{"visibility":"public"}'

      - name: Build summary
        run: |
          echo "## 🐳 ${{ matrix.service }} 镜像构建成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 镜像标签:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 拉取镜像:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/${{ matrix.image }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # 两个镜像都推送成功后，再触发对应环境的 dokploy 重新部署。
  # 独立 job 而非 build 内的 step：matrix 是并行的，写在 step 里会在 api
  # 构建完就触发一次、web 构建完又触发一次，第一次拉到的是半新半旧的组合。
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/master' ||
       github.ref == 'refs/heads/test')

    steps:
      - name: Trigger dokploy redeploy
        env:
          WEBHOOK_PROD: ${{ secrets.DOKPLOY_WEBHOOK_PROD }}
          WEBHOOK_TEST: ${{ secrets.DOKPLOY_WEBHOOK_TEST }}
        run: |
          if [ "${{ github.ref }}" = "refs/heads/test" ]; then
            ENV_NAME="测试"
            WEBHOOK="$WEBHOOK_TEST"
          else
            ENV_NAME="生产"
            WEBHOOK="$WEBHOOK_PROD"
          fi

          if [ -z "$WEBHOOK" ]; then
            echo "::error::${ENV_NAME}环境的 dokploy webhook secret 未配置，跳过部署"
            exit 1
          fi

          # dokploy 会解析请求体里的 ref 来判断分支是否与应用配置的分支一致，
          # 裸 POST 取不到分支会被判为 "Branch Not Match"。这里发一个 GitHub
          # 风格的 push 载荷，ref 直接用当前分支。
          HTTP_CODE=$(curl -s -o /tmp/resp.txt -w '%{http_code}' -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            -H 'X-GitHub-Event: push' \
            -d "{\"ref\":\"${{ github.ref }}\"}")
          echo "dokploy 响应 ${HTTP_CODE}: $(cat /tmp/resp.txt)"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::触发${ENV_NAME}环境部署失败 (HTTP ${HTTP_CODE})"
            exit 1
          fi

          echo "## 🚀 已触发${ENV_NAME}环境部署" >> $GITHUB_STEP_SUMMARY
