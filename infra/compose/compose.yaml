services:
  chat:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.chat
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.web
    ports:
      - "3000:3000"
    depends_on:
      chat:
        condition: service_healthy
