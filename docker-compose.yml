services:
  api:
    # IMAGE_TAG: 生产填 latest，测试填 test（由各自的 dokploy 应用注入）
    image: ghcr.io/cookieboty/autix-api:${IMAGE_TAG:-latest}
    pull_policy: always
    expose:
      - "4100"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      NODE_ENV: production
      # 数据库/缓存均为外部独立服务，只需注入连接串
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
      SUPER_ADMIN_RESET_PASSWORD: ${SUPER_ADMIN_RESET_PASSWORD:-false}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PORT: 4100
    networks:
      - internal
      - dokploy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4100/api/auth/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: ghcr.io/cookieboty/autix-web:${IMAGE_TAG:-latest}
    pull_policy: always
    expose:
      - "3000"
    environment:
      TZ: Asia/Shanghai
      NODE_ENV: production
      PORT: 3000
      API_URL: http://api:4100
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    networks:
      - internal
      - dokploy-network
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  # 本 stack 内部通信（web -> api 用 http://api:4100）
  internal:
    driver: bridge
  # dokploy 共享网络：用于访问独立部署的 postgres / redis 容器，以及 traefik 反代
  dokploy-network:
    external: true
